services:
  db:
    image: mysql:8.4
    container_name: book_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
  # if you pull from docker hub, uncomment this two line, and comment out above line starting from backend:
  # backend:
  #   image: foyez063/book-recommender-backend:latest
    container_name: book_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
  # if you pull from docker hub, uncomment this two line, and comment out above line starting from frontend:
  # frontend:
  #   image: foyez063/book-recommender-frontend:latest
    container_name: book_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql_data: